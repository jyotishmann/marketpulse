# alembic.ini
# Configuration for Alembic database migrations.
# Run migrations with: alembic upgrade head
# Create a new migration: alembic revision --autogenerate -m "description"

[alembic]
# Path to the folder containing migration scripts
script_location = marketpulse/db/migrations

# Adds the project root to sys.path so 'from marketpulse.db.models import Base' works
prepend_sys_path = .

# Separator for multiple version file paths (rarely changed)
version_path_separator = os

# Fallback database URL — overridden in env.py by the DATABASE_URL env var
# Keep this pointing to your local dev database for running alembic from CLI
sqlalchemy.url = postgresql://marketpulse:marketpulse@localhost:5432/marketpulse

# Logging configuration (Alembic standard — leave as-is) 

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S