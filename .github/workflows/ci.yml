# .github/workflows/ci.yml
# Runs on every push and on every PR targeting main.
# Three jobs: lint → (type-check + test in parallel) → done.

name: CI

on:
  push:
    branches: ["**"]              # every branch
  pull_request:
    branches: [main]              # every PR targeting main

jobs:

  # Job 1: Lint & Format 
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.5.0"

      - name: Check lint rules
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  # Job 2: Static Type Checking 
  type-check:
    name: "Type Check"
    runs-on: ubuntu-latest
    needs: lint                   # only run if lint passes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies with dev extras
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy marketpulse/ --ignore-missing-imports

  # Job 3: Test & Coverage 
  test:
    name: "Test & Coverage"
    runs-on: ubuntu-latest
    needs: lint                   # only run if lint passes

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start test services (PostgreSQL + Redis)
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for services to be ready
        run: sleep 10

      - name: Install dependencies with test extras
        run: pip install -e ".[test]"

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Run tests with coverage
        env:
          # Point tests at the test containers (different ports from dev)
          DATABASE_URL: postgresql://marketpulse:marketpulse@localhost:5433/marketpulse_test
          REDIS_URL: redis://localhost:6380/1
          TICKERS: "AAPL,MSFT"
          MODEL_DIR: "/tmp/models"
          LOG_LEVEL: "WARNING"
        run: |
          pytest tests/ -v \
            --cov=marketpulse \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Stop test services
        if: always()              # run even if tests fail — clean up containers
        run: docker compose -f docker-compose.test.yml down

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false  # don't fail CI if Codecov upload fails