# docker-compose.test.yml
# Isolated test database and Redis — used by CI and local test runs.
# Start with: docker compose -f docker-compose.test.yml up -d
# Stop with:  docker compose -f docker-compose.test.yml down

version: "3.9"

services:

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketpulse
      POSTGRES_PASSWORD: marketpulse
      POSTGRES_DB: marketpulse_test   # separate database — never touches dev data
    ports:
      - "5433:5432"                   # different host port — avoids conflict with dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"                   # different host port — avoids conflict with dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10